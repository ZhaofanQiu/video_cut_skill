site_name: Video Cut Skill
site_description: Intelligent video editing for AI agents
site_url: https://zhaofanqiu.github.io/video_cut_skill
repo_url: https://github.com/ZhaofanQiu/video_cut_skill
repo_name: video_cut_skill

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - Testing Guide: testing-guide.md
      - Model Management: models.md
      - Troubleshooting: troubleshooting.md
  - API Reference:
      - Overview: api/index.md
  - Development:
      - Phase 1 Log: development/phase1-log.md
      - Phase 2 Log: development/phase2-log.md
      - Contributing: development/contributing.md
  - Testing:
      - Test 9 Summary: testing/test9-summary.md
  - Research:
      - GitHub Research: research/github-research.md
      - Feature Brainstorm: research/feature-brainstorm.md
      - Project Plan: architecture/project-plan.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ZhaofanQiu
