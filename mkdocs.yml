site_name: Video Cut Skill
site_description: Intelligent video editing for AI agents
site_url: https://zhaofanqiu.github.io/video_cut_skill
repo_url: https://github.com/ZhaofanQiu/video_cut_skill
repo_name: video_cut_skill

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google

nav:
  - Home: index.md
  - Getting Started:
      - Testing Guide: testing-guide.md
      - Model Management: models.md
      - Troubleshooting: troubleshooting.md
      - Configuration: configuration.md
  - API Reference:
      - Overview: api/index.md
  - Development:
      - Contributing: development/contributing.md
      - Architecture Decisions:
          - Overview: adr/README.md
          - ADR-001: adr/001-tiered-transcription.md
          - ADR-002: adr/002-auto-editor-unification.md
  - Research:
      - GitHub Research: research/github-research.md
      - Feature Brainstorm: research/feature-brainstorm.md
      - Project Plan: architecture/project-plan.md
      - Cloud Service Plan: cloud_service_plan.md
  - Reports:
      - Test Report: TEST_REPORT.md
      - Integration Guide: INTEGRATION.md
      - Code Review: CODE_REVIEW_REPORT.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ZhaofanQiu
